name: gp1_mvp
description: "GoJobs - Jordan Job Finding App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Architecture
  go_router: ^14.0.0
  provider: ^6.1.2

  # Firebase Core & Auth
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # Live Database & Storage
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Media Picker & Utilities
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  file_picker: ^11.0.2
  google_fonts: ^8.1.0
  firebase_messaging: ^15.2.10
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/profile_pic.png
    - assets/images/woman_banner.png
    - assets/images/calmalocationn.png
    - assets/images/Group75.png
    - assets/images/Group67.png
    - assets/images/undraw_messagelogo.png
    - assets/images/nosavings.png