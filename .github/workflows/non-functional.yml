name: Non-Functional - Security & Health

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Install Dependencies
        run: flutter pub get

      - name: Dependency Tree Security Check (Non-Functional)
        # Analyzes the package tree for secure version mapping
        run: flutter pub deps

      - name: Vulnerability & Health Audit (Non-Functional)
        # Scans for deprecated or outdated packages that could pose a risk
        run: flutter pub outdated