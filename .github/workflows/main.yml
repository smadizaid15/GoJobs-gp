name: Backend CI/CD (Docker Hub) 
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg FIREBASE_OPTIONS_DART="${{ secrets.FIREBASE_OPTIONS_DART }}" \
            --build-arg API_CONFIG_DART="${{ secrets.API_CONFIG_DART }}" \
            -t my-app .
      
  docker-push:
    needs: test-and-build  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: zaidsmadii/gp1-app:latest
          build-args: |
            FIREBASE_OPTIONS_DART=${{ secrets.FIREBASE_OPTIONS_DART }}
            API_CONFIG_DART=${{ secrets.API_CONFIG_DART }}