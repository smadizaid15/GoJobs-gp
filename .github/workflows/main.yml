name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Set up QEMU (For compatibility)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # 3. Set up Docker Buildx (The builder engine)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Login to Docker Hub (Using the secrets you just added)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build the Web App and Push to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # REPLACE 'smadizaid15' with your ACTUAL Docker Hub username!
          tags: zaidsmadii/gp1-app:latest